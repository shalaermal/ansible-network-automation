- name: Build access switches
  hosts: access_switches
  gather_facts: no

  roles:
    - role: cisco_base
      tags: [base]

    - role: access_switch
      tags: [access]

- name: Configure routers
  hosts: routers
  gather_facts: no

  roles:
    - role: cisco_base
      tags: [base]

    - role: router_interfaces
      tags: [interfaces]
