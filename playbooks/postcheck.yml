- name: Post-check switches
  hosts: access_switches
  gather_facts: no
  tasks:
    - name: Verify VLANs
      cisco.ios.ios_command:
        commands:
          - show vlan brief
      register: vlan_output

    - name: Show VLAN results
      debug:
        var: vlan_output.stdout_lines

- name: Post-check routers
  hosts: routers
  gather_facts: no
  tasks:
    - name: Verify interfaces
      cisco.ios.ios_command:
        commands:
          - show ip interface brief
      register: interface_output

    - name: Show interface results
      debug:
        var: interface_output.stdout_lines

    - name: Verify routing table
      cisco.ios.ios_command:
        commands:
          - show ip route
      register: route_output

    - name: Show routing table
      debug:
        var: route_output.stdout_lines