- name: Pre-check before VLAN change
  hosts: sw03
  gather_facts: no

  tasks:
    - name: Check target interface running config
      cisco.ios.ios_command:
        commands:
          - "show running-config interface {{ change_interface }}"
      register: interface_config

    - name: Check VLAN table
      cisco.ios.ios_command:
        commands:
          - show vlan brief
      register: vlan_table

    - name: Check interface status
      cisco.ios.ios_command:
        commands:
          - "show interfaces status | include {{ change_interface }}"
      register: interface_status

    - name: Print current interface config
      ansible.builtin.debug:
        msg: "{{ interface_config.stdout[0] }}"

    - name: Print current VLAN table
      ansible.builtin.debug:
        msg: "{{ vlan_table.stdout[0] }}"

    - name: Print interface status
      ansible.builtin.debug:
        msg: "{{ interface_status.stdout[0] }}"
