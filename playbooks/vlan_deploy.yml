- name: Deploy VLAN change on access port
  hosts: sw03
  gather_facts: no

  tasks:
    - name: Ensure target VLAN exists
      cisco.ios.ios_vlans:
        config:
          - vlan_id: "{{ target_vlan_id }}"
            name: "{{ target_vlan_name }}"
            state: active
        state: merged

    - name: Configure target interface as access port in target VLAN
      cisco.ios.ios_config:
        parents: "interface {{ change_interface }}"
        lines:
          - switchport mode access
          - "switchport access vlan {{ target_vlan_id }}"
          - "description ASSIGNED_TO_{{ target_vlan_name }}"
          - no shutdown
