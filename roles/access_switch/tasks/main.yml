- name: Set hostname
  cisco.ios.ios_config:
    lines:
      - "hostname {{ hostname }}"

- name: Configure default gateway
  cisco.ios.ios_config:
    lines:
      - "ip default-gateway {{ default_gateway }}"

- name: Configure base VLANs
  cisco.ios.ios_vlans:
    config:
      - vlan_id: 10
        name: MGMT
        state: active
      - vlan_id: 20
        name: USERS
        state: active
      - vlan_id: 30
        name: VOICE
        state: active
    state: merged

- name: Configure management SVI
  cisco.ios.ios_config:
    parents: "interface vlan {{ mgmt_vlan }}"
    lines:
      - "ip address {{ mgmt_ip }} {{ mgmt_mask }}"
      - no shutdown
