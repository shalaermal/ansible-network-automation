- name: Set hostname
  cisco.ios.ios_config:
    lines:
      - "hostname {{ hostname }}"

- name: Configure default gateway
  cisco.ios.ios_config:
    lines:
      - "ip default-gateway {{ default_gateway }}"

- name: Configure base VLANs
  cisco.ios.ios_vlans:
    config:
      - vlan_id: 10
        name: MGMT
        state: active
      - vlan_id: 20
        name: USERS
        state: active
      - vlan_id: 30
        name: VOICE
        state: active
    state: merged

- name: Configure management SVI
  cisco.ios.ios_config:
    parents: "interface vlan {{ mgmt_vlan }}"
    lines:
      - "ip address {{ mgmt_ip }} {{ mgmt_mask }}"
      - no shutdown

- name: Disable unused interfaces
  cisco.ios.ios_config:
    parents: "interface {{ item }}"
    lines:
      - description UNUSED
      - shutdown
  loop: "{{ unused_interfaces }}"

- name: Save configuration
  cisco.ios.ios_config:
    save_when: always

- name: Configure trunk interfaces
  cisco.ios.ios_config:
    parents: "interface {{ item.name }}"
    lines:
      - "switchport trunk encapsulation dot1q"
      - "switchport mode trunk"
      - "switchport trunk allowed vlan {{ item.allowed_vlans }}"
      - "no shutdown"
  loop: "{{ trunk_interfaces | default([]) }}"
  when: trunk_interfaces is defined