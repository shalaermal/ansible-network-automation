- name: Apply common Cisco base config
  cisco.ios.ios_config:
    lines: "{{ cisco_base_config }}"

- name: Configure local admin user
  cisco.ios.ios_config:
    lines:
      - "username {{ local_admin_user }} privilege 15 secret {{ local_admin_password }}"

- name: Configure VTY lines for SSH only
  cisco.ios.ios_config:
    parents: line vty 0 4
    lines:
      - login local
      - transport input ssh

- name: Generate RSA keys if missing
  cisco.ios.ios_command:
    commands:
      - "show crypto key mypubkey rsa"
  register: rsa_keys
  changed_when: false
  failed_when: false

- name: Generate RSA keys
  cisco.ios.ios_config:
    lines:
      - crypto key generate rsa modulus 2048
  when: rsa_keys.stdout is defined and ('% Key pair was generated' not in (rsa_keys.stdout[0] | default(''))) and ('Key name' not in (rsa_keys.stdout[0] | default('')))

- name: Configure DNS servers
  cisco.ios.ios_config:
    lines:
      - "ip name-server {{ item }}"
  loop: "{{ dns_servers }}"

- name: Configure NTP servers
  cisco.ios.ios_config:
    lines:
      - "ntp server {{ item }}"
  loop: "{{ ntp_servers }}"

- name: Configure syslog servers
  cisco.ios.ios_config:
    lines:
      - "logging host {{ item }}"
  loop: "{{ syslog_servers }}"

- name: Configure logging level
  cisco.ios.ios_config:
    lines:
      - "logging trap {{ logging_level }}"

- name: Configure EEM for interface recovery
  cisco.ios.ios_config:
    parents: "event manager applet INTERFACES_UP"
    lines:
      - "event syslog pattern \"SYS-5-RESTART\""
      - "action 1.0 cli command \"enable\""
      - "action 2.0 cli command \"conf t\""
      - "action 3.0 cli command \"int Gi0/0\""
      - "action 4.0 cli command \"no shutdown\""
      - "action 5.0 cli command \"int Gi0/1\""
      - "action 6.0 cli command \"no shutdown\""
      - "action 7.0 cli command \"int Gi0/2\""
      - "action 8.0 cli command \"no shutdown\""
      - "action 9.0 cli command \"int Gi0/3\""
      - "action 10.0 cli command \"no shutdown\""
      - "action 11.0 cli command \"int Loopback0\""
      - "action 12.0 cli command \"no shutdown\""
      - "action 13.0 cli command \"end\""
      - "action 14.0 cli command \"write memory\""
  when: interfaces is defined

- name: Save configuration
  cisco.ios.ios_config:
    save_when: always