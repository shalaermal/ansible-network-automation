- name: Configure OSPF
  cisco.ios.ios_config:
    parents: "router ospf 1"
    lines:
      - "router-id {{ loopback_ip }}"
      - "network {{ item.network }} {{ item.wildcard }} area {{ item.area }}"
  loop: "{{ ospf_networks }}"
  when: ospf_networks is defined

- name: Remove point-to-point from loopback
  cisco.ios.ios_config:
    parents: "interface Loopback0"
    lines:
      - "no ip ospf network point-to-point"
  when: ospf_networks is defined

- name: Set point-to-point on PE-CE interface
  cisco.ios.ios_config:
    parents: "interface GigabitEthernet0/2"
    lines:
      - "ip ospf network point-to-point"
  when: >
    ospf_networks is defined and
    ospf_networks | selectattr('area', '!=', 0) | list | length > 0

- name: Save configuration
  cisco.ios.ios_config:
    save_when: always