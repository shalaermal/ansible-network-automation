hostname: Router_CE2
mgmt_ip: 192.168.0.16/24
mgmt_mask: 255.255.255.0

# BGP
bgp_router_id: 10.255.0.6
bgp_local_as: 65002
pe_neighbor:
  ip: 10.2.2.1
  as: 65000

customer_networks:
  - network: 10.20.20.0
    mask: 255.255.255.0
  - network: 10.20.30.0
    mask: 255.255.255.0

# Interfaces
interfaces:
  - name: GigabitEthernet0/1
    ip: 10.2.2.2
    mask: 255.255.255.252
  - name: GigabitEthernet0/2
    ip: 172.16.20.1
    mask: 255.255.255.0
  - name: Loopback0
    ip: 10.255.0.6
    mask: 255.255.255.255

subinterfaces:
  - name: GigabitEthernet0/2.20
    vlan: 20
    ip: 10.20.20.1
    mask: 255.255.255.0
  - name: GigabitEthernet0/2.30
    vlan: 30
    ip: 10.20.30.1
    mask: 255.255.255.0

dhcp_pools:
  - name: USERS_CE2
    network: 10.20.20.0
    mask: 255.255.255.0
    gateway: 10.20.20.1
    dns: 8.8.8.8
    exclude_start: 10.20.20.1
    exclude_end: 10.20.20.10
  - name: VOICE_CE2
    network: 10.20.30.0
    mask: 255.255.255.0
    gateway: 10.20.30.1
    dns: 8.8.8.8
    exclude_start: 10.20.30.1
    exclude_end: 10.20.30.10