hostname: Router_PE2
mgmt_ip: 192.168.0.14/24
mgmt_mask: 255.255.255.0

loopback_ip: 10.255.0.4
bgp_router_id: 10.255.0.4

interfaces:
  - name: GigabitEthernet0/1
    ip: 10.0.14.2
    mask: 255.255.255.252
  - name: GigabitEthernet0/2
    ip: 10.2.2.1
    mask: 255.255.255.252
  - name: GigabitEthernet0/3
    ip: 10.0.24.2
    mask: 255.255.255.252
  - name: Loopback0
    ip: 10.255.0.4
    mask: 255.255.255.255

# IS-IS
isis_net: "49.0001.0102.5500.0004.00"
isis_interfaces:
  - name: GigabitEthernet0/1
    metric: 10
  - name: GigabitEthernet0/3
    metric: 10

# MPLS
mpls_interfaces:
  - GigabitEthernet0/1
  - GigabitEthernet0/3

# BGP RR Clients
bgp_rr_peers:
  - ip: 10.255.0.1
    description: P1-RR
  - ip: 10.255.0.2
    description: P2-RR

# VRF CE neighbor
ce_neighbor:
  ip: 10.2.2.2
  as: 65002
  interface: GigabitEthernet0/2
  pe_ip: 10.2.2.1