hostname: Router_P2
mgmt_ip: 192.168.0.12/24
mgmt_mask: 255.255.255.0

loopback_ip: 10.255.0.2
bgp_router_id: 10.255.0.2

interfaces:
  - name: GigabitEthernet0/1
    ip: 10.0.12.2
    mask: 255.255.255.252
  - name: GigabitEthernet0/2
    ip: 10.0.24.1
    mask: 255.255.255.252
  - name: GigabitEthernet0/3
    ip: 10.0.21.1
    mask: 255.255.255.252
  - name: Loopback0
    ip: 10.255.0.2
    mask: 255.255.255.255

# IS-IS
isis_net: "49.0001.0102.5500.0002.00"
isis_interfaces:
  - name: GigabitEthernet0/1
    metric: 10
  - name: GigabitEthernet0/2
    metric: 10
  - name: GigabitEthernet0/3
    metric: 10

# MPLS
mpls_interfaces:
  - GigabitEthernet0/1
  - GigabitEthernet0/2
  - GigabitEthernet0/3

# BGP Route Reflector
bgp_rr_peers:
  - ip: 10.255.0.1
    description: P1-RR-Peer

bgp_rr_clients:
  - ip: 10.255.0.3
    description: PE1-RR-Client
  - ip: 10.255.0.4
    description: PE2-RR-Client