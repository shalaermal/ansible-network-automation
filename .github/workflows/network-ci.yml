name: Network CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  precheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Connect runner to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          tags: tag:ci
          ping: ${{ secrets.VM_HOST }}

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Run precheck
        run: |
          sshpass -p "${{ secrets.VM_PASS }}" ssh -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} '
            cd ~/networking-ansible-lab &&
            git pull &&
            ansible-playbook playbooks/precheck.yml
          '

  deploy:
    runs-on: ubuntu-latest
    needs: precheck
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3

      - name: Connect runner to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          tags: tag:ci
          ping: ${{ secrets.VM_HOST }}

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy config
        run: |
          sshpass -p "${{ secrets.VM_PASS }}" ssh -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} '
            cd ~/networking-ansible-lab &&
            git pull &&
            ansible-playbook playbooks/site.yml
          '

  postcheck:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3

      - name: Connect runner to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          tags: tag:ci
          ping: ${{ secrets.VM_HOST }}

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Run postcheck
        run: |
          sshpass -p "${{ secrets.VM_PASS }}" ssh -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} '
            cd ~/networking-ansible-lab &&
            git pull &&
            ansible-playbook playbooks/postcheck.yml
          '